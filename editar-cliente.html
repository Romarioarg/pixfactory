<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cliente | PixFactory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: #fff;
            display: flex;
            overflow-x: hidden;
        }
        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            background-color: #04b45f;
            color: #fff;
            border: none;
            padding: 10px 15px;
            font-size: 24px;
            cursor: pointer;
            border-radius: 8px;
            z-index: 1100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.3s ease-in-out;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 240px;
            height: 100vh;
            background-color: #1e1e1e;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
            overflow-y: auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transform: translateX(0);
            transition: transform 0.3s ease-in-out;
        }
        .sidebar.active { transform: translateX(0); }
        .sidebar.hidden { transform: translateX(-100%); }
        .sidebar .logo {
            font-size: 22px;
            font-weight: bold;
            color: #04b45f;
            margin-bottom: 30px;
            text-align: left;
            padding: 0;
        }
        .sidebar nav {
            flex-grow: 1;
        }
        .sidebar nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sidebar nav ul li {
            margin-bottom: 15px;
        }
        .sidebar nav ul li a {
            text-decoration: none;
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color 0.3s;
            padding: 0;
            border-left: none;
        }
        .sidebar nav ul li a:hover,
        .sidebar nav ul li a.active {
            color: #04b45f;
            background-color: transparent;
            border-left-color: transparent;
        }
        .sidebar .icon {
            font-size: 1em;
        }
        .sidebar .fa-solid, .sidebar .fa-brands {
            font-size: 18px;
            width: 20px;
            text-align: center;
        }
        .azul            { color: #3498db; }
        .verde           { color: #2ecc71; }
        .amarelo         { color: #f1c40f; }
        .vermelho        { color: #e74c3c; }
        .roxo            { color: #9b59b6; }
        .azul-claro      { color: #5dade2; }
        .vermelho-claro  { color: #f1948a; }
        .cinza           { color: #bdc3c7; }
        .limao           { color: #a3e635; }
        .roxo-claro      { color: #c084fc; }
        .laranja         { color: #e67e22; }
        .azul-escuro     { color: #2c3e50; }
        .sidebar footer {
            text-align: center;
            font-size: 12px;
            color: #888;
            padding: 0;
            border-top: none;
            margin-top: auto;
        }

        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 40px 0;
            max-width: calc(100% - 320px);
            margin-right: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }
        .main-content header {
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(4, 180, 95, 0.3);
            padding-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .main-content header h1 {
            color: #04b45f;
            font-size: 28px;
            margin: 0;
        }
        .main-content .edit-form-container {
            background-color: #1e1e1e;
            border: 1px solid #04b45f;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(4,180,95,0.12);
            padding: 36px 30px 20px 30px;
            max-width: 410px;
            width: 100%;
            margin: 0 auto;
        }
        form label {
            display: block;
            margin-bottom: 6px;
            color: #04b45f;
            font-size: 15px;
        }
        form input, form select {
            width: 100%;
            padding: 10px;
            margin-bottom: 14px;
            border: 1px solid #04b45f;
            border-radius: 7px;
            background: #121212;
            color: #fff;
            font-size: 15px;
            box-sizing: border-box;
        }
        form input:focus, form select:focus {
            border-color: #03a252;
            outline: none;
        }
        .btn-salvar {
            background-color: #04b45f;
            color: #fff;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 7px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        .btn-salvar:hover {
            background-color: #03a252;
        }
        .btn-voltar {
            background: none;
            border: none;
            color: #04b45f;
            font-size: 15px;
            cursor: pointer;
            margin-top: 8px;
            text-decoration: underline;
            width: 100%;
        }
        .status-msg {
            text-align: center;
            margin-bottom: 10px;
            min-height: 18px;
            color: #2ecc71;
        }
        .status-msg.error {
            color: #e74c3c;
        }
        @media (max-width: 768px) {
            body { flex-direction: column; align-items: center; }
            .sidebar {
                width: 280px;
                transform: translateX(-100%);
                left: 0;
                box-shadow: 0 0 15px rgba(0,0,0,0.5);
            }
            .sidebar.active { transform: translateX(0);}
            .menu-toggle { display: block; }
            .main-content {
                margin-left: 0;
                margin-right: 0;
                padding: 20px 0 40px 0;
                max-width: 100%;
                padding-top: 70px;
            }
            .main-content .edit-form-container {
                padding: 20px 7px 15px 7px;
            }
            .sidebar footer { display: none; }
        }
        @media (max-width: 500px){
            .main-content .edit-form-container { padding: 10px 1px 8px 1px;}
        }
    </style>
</head>
<body>
    <button class="menu-toggle" aria-label="Abrir menu" onclick="toggleMenu()">☰</button>
    <aside class="sidebar">
        <div class="logo">💵 PixFactory</div>
        <nav>
            <ul>
                <li><a href="dashboard.html"><span class="icon azul">🏠</span> Dashboard</a></li>
                <li><a href="clientes.html" class="active"><span class="icon verde">👤</span> Clientes</a></li>
                <li><a href="cadastro.html"><span class="icon amarelo">➕</span> Novo Cliente</a></li>
                <li><a href="contratos.html"><span class="icon vermelho">📄</span> Contratos</a></li>
                <li><a href="agenda.html"><span class="icon roxo">📆</span> Agenda</a></li>
                <li><a href="simulador.html"><span class="icon azul-claro">📊</span> Simulador</a></li>
                <li><a href="exportacao.html"><span class="icon vermelho-claro">📥</span> Exportação</a></li>
                <li><a href="configuracoes.html"><span class="icon cinza">⚙️</span> Configurações</a></li>
                <li><a href="perfil.html"><span class="icon limao">🧑‍💼</span> Perfil</a></li>
                <li><a href="notificacoes.html"><span class="icon vermelho">🔔</span> Notificações</a></li>
                <li><a href="https://wa.me/5581999999999?text=Olá! Preciso de ajuda com o PixFactory." target="_blank"><span class="icon azul-escuro">🆘</span> Suporte</a></li>
                <li><a href="#" onclick="abrirSugestao()"><span class="icon">💡</span> Enviar Sugestão</a></li>
            </ul>
        </nav>
        <footer>Desenvolvido por RomarioDev • PixFactory © 2025</footer>
    </aside>

    <main class="main-content">
        <header>
            <h1>Editar Cliente</h1>
            <span class="header-icon">✏️</span>
        </header>
        <div class="edit-form-container">
            <form id="formEditar">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required />

                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" name="cpf" />

                <label for="telefone">Telefone:</label>
                <input type="text" id="telefone" name="telefone" />

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" />

                <label for="dataNascimento">Data de Nascimento:</label>
                <input type="date" id="dataNascimento" name="dataNascimento" />

                <label for="endereco">Endereço:</label>
                <input type="text" id="endereco" name="endereco" />

                <label for="profissao">Profissão:</label>
                <input type="text" id="profissao" name="profissao" />

                <label for="rendaMensal">Renda Mensal:</label>
                <input type="number" step="0.01" id="rendaMensal" name="rendaMensal" />

                <label for="banco">Banco:</label>
                <input type="text" id="banco" name="banco" />

                <label for="tipoDocumento">Tipo de Documento:</label>
                <input type="text" id="tipoDocumento" name="tipoDocumento" />

                <label for="estadoCivil">Estado Civil:</label>
                <select id="estadoCivil" name="estadoCivil">
                    <option value="">Selecione</option>
                    <option value="Solteiro(a)">Solteiro(a)</option>
                    <option value="Casado(a)">Casado(a)</option>
                    <option value="Divorciado(a)">Divorciado(a)</option>
                    <option value="Viúvo(a)">Viúvo(a)</option>
                </select>

                <label for="classificacao">Classificação:</label>
                <select id="classificacao" name="classificacao">
                    <option value="">Selecione</option>
                    <option value="Bom pagador">Bom pagador</option>
                    <option value="Inadimplente">Inadimplente</option>
                    <option value="Em dia">Em dia</option>
                </select>

                <button type="submit" class="btn-salvar">Salvar Alterações</button>
                <button type="button" class="btn-voltar" onclick="voltar()">Cancelar</button>
                <div class="status-msg" id="statusMsg"></div>
            </form>
        </div>
    </main>

    <div id="janela-sugestao" class="janela-sugestao" style="display:none;position:fixed;bottom:20px;right:20px;background-color:#1e1e1e;padding:20px;border:1px solid #04b45f;border-radius:10px;z-index:1000;">
        <textarea placeholder="Digite sua sugestão aqui..." style="width:100%;height:100px;background:#121212;border:1px solid #04b45f;color:#fff;border-radius:8px;padding:10px;margin-bottom:10px;box-sizing:border-box;resize:vertical;"></textarea>
        <button onclick="enviarSugestao()" style="background-color:#04b45f;color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;align-self:flex-end;transition:background-color 0.3s;">Enviar</button>
    </div>

    <script>
        // Dados fictícios de clientes para simular a busca
        const clientesFicticios = [
            {
                id: 1,
                nome: "João da Silva",
                cpf: "123.456.789-00",
                telefone: "(11) 98765-4321",
                email: "joao.silva@exemplo.com",
                dataNascimento: "1990-05-15",
                endereco: "Rua das Flores, 123 - Centro, SP",
                profissao: "Desenvolvedor",
                rendaMensal: 5000.00,
                banco: "Banco A",
                tipoDocumento: "RG",
                estadoCivil: "Solteiro(a)",
                classificacao: "Bom pagador"
            },
            {
                id: 2,
                nome: "Maria Oliveira",
                cpf: "987.654.321-00",
                telefone: "(11) 99887-7665",
                email: "maria.oliveira@exemplo.com",
                dataNascimento: "1985-11-20",
                endereco: "Av. Paulista, 1500 - Bela Vista, SP",
                profissao: "Designer",
                rendaMensal: 6000.00,
                banco: "Banco B",
                tipoDocumento: "RG",
                estadoCivil: "Casado(a)",
                classificacao: "Inadimplente"
            },
            {
                id: 3,
                nome: "Carlos Pereira",
                cpf: "111.222.333-44",
                telefone: "(21) 91234-5678",
                email: "carlos.pereira@exemplo.com",
                dataNascimento: "1995-02-10",
                endereco: "Rua do Comércio, 456 - Lapa, RJ",
                profissao: "Marketing",
                rendaMensal: 4500.00,
                banco: "Banco C",
                tipoDocumento: "CNH",
                estadoCivil: "Solteiro(a)",
                classificacao: "Em dia"
            }
        ];

        // Funções menu lateral responsivo
        function toggleMenu() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('active');
        }
        function abrirSugestao() {
            const janelaSugestao = document.getElementById('janela-sugestao');
            janelaSugestao.style.display = (janelaSugestao.style.display === 'flex') ? 'none' : 'flex';
        }
        function enviarSugestao() {
            const textarea = document.querySelector('#janela-sugestao textarea');
            const sugestao = textarea.value.trim();
            if (sugestao) {
                alert('✅ Sugestão enviada com sucesso: ' + sugestao);
                textarea.value = '';
                abrirSugestao();
            } else {
                alert('Por favor, digite sua sugestão antes de enviar.');
            }
        }
        function voltar() {
            window.location.href = "clientes.html";
        }

        // Carregar e editar cliente (Lógica simulada)
        document.addEventListener('DOMContentLoaded', function() {
            // Fecha menu lateral ao clicar fora no mobile
            document.addEventListener('click', (event) => {
                const sidebar = document.querySelector('.sidebar');
                const menuToggle = document.querySelector('.menu-toggle');
                if (window.innerWidth <= 768 && !sidebar.contains(event.target) && !menuToggle.contains(event.target) && sidebar.classList.contains('active')) {
                    sidebar.classList.remove('active');
                }
            });
            // Recupera o id do cliente da URL (?clienteId=1)
            function getClienteId() {
                const params = new URLSearchParams(window.location.search);
                return parseInt(params.get('clienteId'));
            }
            const clienteId = getClienteId();
            const cliente = clientesFicticios.find(c => c.id === clienteId);
            const statusMsg = document.getElementById('statusMsg');

            if (!clienteId || !cliente) {
                statusMsg.classList.add('error');
                statusMsg.innerText = "Erro: Nenhum cliente selecionado ou cliente não encontrado!";
                document.getElementById('formEditar').style.display = 'none';
                return;
            }
            
            // Preenche os campos do formulário com os dados do cliente fictício
            document.getElementById('nome').value = cliente.nome || "";
            document.getElementById('cpf').value = cliente.cpf || "";
            document.getElementById('telefone').value = cliente.telefone || "";
            document.getElementById('email').value = cliente.email || "";
            document.getElementById('dataNascimento').value = cliente.dataNascimento || "";
            document.getElementById('endereco').value = cliente.endereco || "";
            document.getElementById('profissao').value = cliente.profissao || "";
            document.getElementById('rendaMensal').value = cliente.rendaMensal || "";
            document.getElementById('banco').value = cliente.banco || "";
            document.getElementById('tipoDocumento').value = cliente.tipoDocumento || "";
            document.getElementById('estadoCivil').value = cliente.estadoCivil || "";
            document.getElementById('classificacao').value = cliente.classificacao || "";

            // Envia alterações (lógica simulada)
            document.getElementById('formEditar').addEventListener('submit', function(e) {
                e.preventDefault();
                statusMsg.classList.remove('error');
                statusMsg.innerText = "";
                
                // Simulação de salvamento
                alert('✅ Alterações do cliente salvas com sucesso! Redirecionando...');
                setTimeout(() => { voltar(); }, 800);
            });
        });
    </script>
</body>
</html>
